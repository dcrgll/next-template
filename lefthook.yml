pre-commit:
  jobs:
    - run: pnpm exec ultracite fix
      glob:
        - '**/*.js'
        - '**/*.jsx'
        - '**/*.ts'
        - '**/*.tsx'
        - '**/*.json'
        - '**/*.jsonc'
        - '**/*.css'
      stage_fixed: true

commit-msg:
  jobs:
    - run: pnpm exec commitlint --edit {1}

pre-push:
  jobs:
    - run: pnpm lint:check
    - run: pnpm typecheck
